name: PR Validator

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'apps/delisted/**'

concurrency:
  group: pr-validator-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate PR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Extract app_id from changed files
        id: extract
        run: |
          FILES="${{ github.event.pull_request.files[*].filename }}"
          APP_ID=$(echo "$FILES" | grep -oP 'apps/delisted/\K\d+(?=\.json)' | head -1)
          if [ -z "$APP_ID" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No app_id found in changed files, skipping."
            exit 0
          fi
          echo "app_id=$APP_ID" >> "$GITHUB_OUTPUT"
          echo "Detected app_id: $APP_ID"

      - name: Skip if no app_id
        if: steps.extract.outputs.skip == 'true'
        run: echo "Skipping validation — no delisted app JSON changed."

      - name: Read PR branch JSON
        if: steps.extract.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APP_ID="${{ steps.extract.outputs.app_id }}"
          PR_NUM="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"

          # Read JSON from PR branch using raw accept header
          JSON_CONTENT=$(gh api \
            "repos/$REPO/contents/apps/delisted/${APP_ID}.json" \
            --method GET \
            -f ref="refs/pull/${PR_NUM}/merge" \
            -H "Accept: application/vnd.github.raw+json" 2>&1)

          if [ $? -ne 0 ]; then
            echo "ERROR: Failed to read JSON from PR branch"
            exit 1
          fi

          echo "$JSON_CONTENT" > /tmp/app_detail.json

          # Extract fields
          APP_NAME=$(jq -r '.name // "unknown"' /tmp/app_detail.json)
          COUNTRIES=$(jq -r '.countries // [] | join(",")' /tmp/app_detail.json)

          echo "app_name=$APP_NAME" >> "$GITHUB_ENV"
          echo "countries=$COUNTRIES" >> "$GITHUB_ENV"
          echo "App name: $APP_NAME"
          echo "Countries: $COUNTRIES"

      - name: Check duplicate on main
        if: steps.extract.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APP_ID="${{ steps.extract.outputs.app_id }}"
          REPO="${{ github.repository }}"

          # Check if file exists on main
          if gh api "repos/$REPO/contents/apps/delisted/${APP_ID}.json" --silent 2>/dev/null; then
            echo "::error::App $APP_ID already exists on main branch — duplicate!"
            echo "DUPLICATE_MAIN=true" >> "$GITHUB_ENV"
          else
            echo "DUPLICATE_MAIN=false" >> "$GITHUB_ENV"
          fi

      - name: Check duplicate PRs
        if: steps.extract.outputs.skip != 'true' && env.DUPLICATE_MAIN != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APP_ID="${{ steps.extract.outputs.app_id }}"
          REPO="${{ github.repository }}"
          CURRENT_PR="${{ github.event.pull_request.number }}"

          # Search for open PRs with this app_id in title
          RESULT=$(gh search prs --repo "$REPO" --state open "$APP_ID" --json number,title 2>/dev/null || echo '[]')

          OTHER_PR=$(echo "$RESULT" | jq -r ".[] | select(.number != $CURRENT_PR) | .number" | head -1)

          if [ -n "$OTHER_PR" ]; then
            echo "::error::Another open PR #$OTHER_PR already covers app $APP_ID"
            echo "DUPLICATE_PR=true" >> "$GITHUB_ENV"
          else
            echo "DUPLICATE_PR=false" >> "$GITHUB_ENV"
          fi

      - name: Verify delisted via iTunes lookup
        if: steps.extract.outputs.skip != 'true' && env.DUPLICATE_MAIN != 'true' && env.DUPLICATE_PR != 'true'
        run: |
          APP_ID="${{ steps.extract.outputs.app_id }}"

          # Use countries from JSON, fallback to CN
          IFS=',' read -ra REGIONS <<< "${{ env.countries }}"
          if [ ${#REGIONS[@]} -eq 0 ]; then
            REGIONS=("CN")
          fi

          STORE_FOUND=false
          FOUND_IN=""

          for REGION in "${REGIONS[@]}"; do
            RESULT=$(curl -s "https://itunes.apple.com/lookup?id=${APP_ID}&country=${REGION}" | jq '.resultCount')
            if [ "$RESULT" != "0" ] && [ -n "$RESULT" ]; then
              STORE_FOUND=true
              FOUND_IN="$REGION"
              break
            fi
          done

          if [ "$STORE_FOUND" = true ]; then
            echo "::error::App $APP_ID is still available on the App Store (country: $FOUND_IN)"
            echo "STORE_AVAILABLE=true" >> "$GITHUB_ENV"
          else
            echo "STORE_AVAILABLE=false" >> "$GITHUB_ENV"
          fi

      - name: Comment and close on failure
        if: steps.extract.outputs.skip != 'true' && (env.DUPLICATE_MAIN == 'true' || env.DUPLICATE_PR == 'true' || env.STORE_AVAILABLE == 'true')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUM="${{ github.event.pull_request.number }}"
          APP_ID="${{ steps.extract.outputs.app_id }}"
          MARKER="<!-- pr-validator -->"

          if [ "$DUPLICATE_MAIN" = true ]; then
            MSG="❌ **验证失败：重复收录**\n\nApp \`$APP_ID\` 已存在于 main 分支。"
          elif [ "$DUPLICATE_PR" = true ]; then
            MSG="❌ **验证失败：重复 PR**\n\nApp \`$APP_ID\` 已有其他 open PR 在处理。"
          elif [ "$STORE_AVAILABLE" = true ]; then
            MSG="❌ **验证失败：应用仍在商店**\n\nApp \`$APP_ID\` 在 ${FOUND_IN} 区 App Store 仍可搜索到，疑似未下架。"
          fi

          # Try to find existing comment with marker
          EXISTING=$(gh api \
            "repos/${{ github.repository }}/issues/$PR_NUM/comments" \
            --jq ".[].body" 2>/dev/null | grep -c "$MARKER" || echo "0")

          if [ "$EXISTING" -gt 0 ]; then
            COMMENT_ID=$(gh api \
              "repos/${{ github.repository }}/issues/$PR_NUM/comments" \
              --jq '.[] | select(.body | contains("<!-- pr-validator -->")) | .id' | head -1)
            gh api "repos/${{ github.repository }}/issues/comments/$COMMENT_ID" \
              --method PATCH \
              --input <(echo "{\"body\": \"${MSG}\n\n${MARKER}\"}")
          else
            echo -e "$MSG\n\n$MARKER" | gh issue comment $PR_NUM --body-file -
          fi

          # Close PR
          gh pr close $PR_NUM --comment "PR 已自动关闭。如确认应用已下架，请重新提交并补充说明。"
          exit 1

      - name: Comment success
        if: steps.extract.outputs.skip != 'true' && env.DUPLICATE_MAIN != 'true' && env.DUPLICATE_PR != 'true' && env.STORE_AVAILABLE != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUM="${{ github.event.pull_request.number }}"
          MARKER="<!-- pr-validator -->"

          SUCCESS_MSG="✅ **验证通过**\n\nApp \`$APP_ID\` 通过所有检查：无重复、确认已下架。"

          EXISTING=$(gh api \
            "repos/${{ github.repository }}/issues/$PR_NUM/comments" \
            --jq ".[].body" 2>/dev/null | grep -c "$MARKER" || echo "0")

          if [ "$EXISTING" -gt 0 ]; then
            COMMENT_ID=$(gh api \
              "repos/${{ github.repository }}/issues/$PR_NUM/comments" \
              --jq '.[] | select(.body | contains("<!-- pr-validator -->")) | .id' | head -1)
            gh api "repos/${{ github.repository }}/issues/comments/$COMMENT_ID" \
              --method PATCH \
              --input <(echo "{\"body\": \"${SUCCESS_MSG}\n\n${MARKER}\"}")
          else
            echo -e "$SUCCESS_MSG\n\n$MARKER" | gh issue comment $PR_NUM --body-file -
          fi
