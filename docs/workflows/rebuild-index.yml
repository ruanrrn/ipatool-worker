name: Rebuild Index

on:
  push:
    branches: [main]
    paths:
      - 'apps/delisted/**'

concurrency:
  group: rebuild-index
  cancel-in-progress: false

jobs:
  rebuild:
    name: Rebuild delisted-lite index
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Rebuild index
        run: |
          INDEX_FILE="indexes/delisted-lite.json"
          TEMP_FILE=$(mktemp)

          # Collect all app JSON files
          APP_FILES=$(find apps/delisted -name '*.json' 2>/dev/null | sort)
          COUNT=$(echo "$APP_FILES" | grep -c . || echo 0)

          if [ "$COUNT" -eq 0 ]; then
            echo "No app JSON files found."
            echo "[]" > "$TEMP_FILE"
          else
            # Build index array using jq
            FIRST=true
            echo "[" > "$TEMP_FILE"
            for f in $APP_FILES; do
              LITE=$(jq -c '{
                id: .id,
                name: .name,
                bundle_id: .bundle_id,
                artist_name: .artist_name,
                icon_asset: .icon_asset,
                latest_version: (.versions[0].version // ""),
                updated_at: .updated_at
              }' "$f")
              if [ "$FIRST" = true ]; then
                echo "  $LITE" >> "$TEMP_FILE"
                FIRST=false
              else
                echo ", $LITE" >> "$TEMP_FILE"
              fi
            done
            echo "]" >> "$TEMP_FILE"
          fi

          # Wrap with metadata
          FINAL=$(jq -c --arg count "$COUNT" '{
            schema_version: 1,
            count: ($count | tonumber),
            generated_at: (now | todateiso8601),
            apps: .
          }' "$TEMP_FILE")

          echo "$FINAL" | jq '.' > "$INDEX_FILE"
          echo "Rebuilt index with $COUNT apps"

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet indexes/delisted-lite.json; then
            echo "No changes to index, skipping commit."
          else
            git add indexes/delisted-lite.json
            git commit -m "chore: rebuild delisted-lite index [skip ci]"
            git push
          fi
