name: Docker Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        type: string
        default: 'v1.0.0'
      push_image:
        description: 'Push image to registry'
        required: false
        default: 'true'
        type: boolean
      # 注意：手动触发时，默认会推送到 Docker Hub
      # 如不推送，请取消勾选此选项
      run_tests:
        description: 'Run tests before building'
        required: false
        default: 'true'
        type: boolean
      force_build:
        description: 'Force build even if version exists'
        required: false
        default: 'false'
        type: boolean
  push:
    tags:
      - 'v*.*.*'
  repository_dispatch:
    types: [version-changed]
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'Dockerfile'
      - 'server/**'
      - 'frontend/**'
      - 'package.json'

env:
  REGISTRY: docker.io
  IMAGE_NAME: ipatool

jobs:
  extract-version:
    name: Extract Version
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.extract.outputs.should_build }}
      version: ${{ steps.extract.outputs.version }}
      error_message: ${{ steps.extract.outputs.error_message }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version
        id: extract
        run: |
          # 确定版本号来源
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # PR 事件：仅验证代码可构建，不实际构建/推送镜像
            VERSION=$(node -p "require('./package.json').version")
            echo "🔍 PR check: version ${VERSION} (test build only)"
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
            echo "should_build=false" >> $GITHUB_OUTPUT
            exit 0
          elif [ "${{ github.event_name }}" = "push" ]; then
            # 从 tag 名提取版本号（去掉 v 前缀）
            TAG_NAME="${{ github.ref_name }}"
            VERSION="${TAG_NAME#v}"
            echo "📌 Tag push detected: ${TAG_NAME} → version ${VERSION}"
          elif [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            # repository_dispatch 通过 client_payload 传递版本号
            VERSION="${{ github.event.client_payload.version }}"
            echo "📡 Repository dispatch: version ${VERSION}"
          else
            # workflow_dispatch 使用输入参数
            INPUT_VERSION="${{ inputs.version }}"
            echo "📝 Manual trigger: ${INPUT_VERSION}"
            VERSION="${INPUT_VERSION#v}"
          fi
          
          # 验证版本号格式
          if [[ ! "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Error: Invalid version format. Expected: x.y.z (e.g., 2.2.0)"
            echo "should_build=false" >> $GITHUB_OUTPUT
            echo "error_message=Invalid version format. Expected: x.y.z" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          # 从 package.json 读取当前版本号
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "📦 Package version: ${PACKAGE_VERSION}"

          # 比较版本号（目标版本必须 >= package.json 版本）
          HIGHER=$(printf '%s\n%s\n' "${VERSION}" "${PACKAGE_VERSION}" | sort -VC | tail -1)
          if [ "${HIGHER}" != "${VERSION}" ]; then
            echo "❌ Error: Target version ${VERSION} < package version ${PACKAGE_VERSION}"
            echo "should_build=false" >> $GITHUB_OUTPUT
            echo "error_message=Version ${VERSION} must be >= ${PACKAGE_VERSION}" >> $GITHUB_OUTPUT
            exit 1
          fi

          echo "✅ Version validation passed"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

          # 如果是强制构建，直接返回 true
          if [ "${{ inputs.force_build || 'false' }}" == "true" ]; then
            echo "⚠️ Force build enabled"
            echo "should_build=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # 检查 Docker Hub 是否已存在该版本
          echo "🔍 Checking if image exists for version ${VERSION}..."

          # 设置镜像名称
          if [ -n "${{ secrets.DOCKER_USERNAME }}" ]; then
            IMAGE="${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}"
          else
            IMAGE="heard/${{ env.IMAGE_NAME }}"
          fi

          echo "Image name: ${IMAGE}:${VERSION}"

          # 使用 Docker Hub API V2 检查镜像是否存在
          RESPONSE=$(curl -s "https://hub.docker.com/v2/repositories/${IMAGE}/tags/${VERSION}")

          if echo "${RESPONSE}" | grep -q '"id"'; then
            echo "❌ Image ${IMAGE}:${VERSION} already exists"
            echo "should_build=false" >> $GITHUB_OUTPUT
            echo "error_message=Image already exists. Use force_build=true to override." >> $GITHUB_OUTPUT
          else
            echo "✅ Image ${IMAGE}:${VERSION} does not exist, will build"
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi

  version-error:
    name: Version Validation Error
    needs: extract-version
    if: |
      needs.extract-version.outputs.should_build == 'false' &&
      needs.extract-version.outputs.error_message != ''
    runs-on: ubuntu-latest
    steps:
      - name: Display error
        run: |
          echo "❌ Version Validation Failed"
          echo ""
          echo "Error: ${{ needs.extract-version.outputs.error_message }}"
          echo ""
          echo "Please check your version input and try again."
          exit 1

  skip-build:
    name: Skip Build
    runs-on: ubuntu-latest
    needs: extract-version
    if: github.event_name == 'workflow_dispatch' && needs.extract-version.outputs.should_build == 'false'
    
    steps:
      - name: Skip notification
        run: |
          VERSION="${{ needs.extract-version.outputs.version }}"
          echo "==================================="
          echo "Version ${VERSION} already exists"
          echo "Skipping build and push"
          echo "==================================="
          echo ""
          echo "To force build, run workflow with 'force_build' input set to true"

  build:
    name: Build and Push
    runs-on: ubuntu-latest
    needs: extract-version
    if: |
      github.event_name != 'pull_request' &&
      needs.extract-version.outputs.should_build == 'true'
    permissions:
      contents: read
      packages: write
      id-token: write
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Log in to Docker Hub
        if: |
          (github.event_name == 'workflow_dispatch' && inputs.push_image == true) ||
          github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME != '' && format('{0}/{1}', secrets.DOCKER_USERNAME, env.IMAGE_NAME) || format('heard/{0}', env.IMAGE_NAME) }}
          tags: |
            type=semver,pattern=${{ needs.extract-version.outputs.version }}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: |
            ${{ (github.event_name == 'workflow_dispatch' && inputs.push_image == true) ||
                github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          provenance: false
          build-args: |
            BUILDKIT_INLINE_CACHE=1  # 启用内联缓存
            VERSION=${{ needs.extract-version.outputs.version }}

      - name: Run Trivy vulnerability scanner
        if: inputs.push_image == 'true'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME != '' && format('{0}/{1}', secrets.DOCKER_USERNAME, env.IMAGE_NAME) || format('heard/{0}', env.IMAGE_NAME) }}:${{ needs.extract-version.outputs.version }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security tab
        if: always() && github.event_name != 'pull_request' && hashFiles('trivy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'docker-image'

      - name: Image digest
        run: echo "Image pushed with digest ${{ steps.meta.outputs.digest }}"
